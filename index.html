<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水生生物パズル Web</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #c8e6ff, #a0d2eb);
            font-family: 'Meiryo', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        #header {
            padding: 10px;
            color: #323264;
            text-align: center;
        }
        #game-container {
            position: relative;
            width: 1000px;
            height: 600px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        #controls {
            padding: 10px;
            color: #323264;
            font-size: 14px;
        }
        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 15px;
            z-index: 10;
        }
        #overlay h1 { font-size: 48px; }
        #overlay button {
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="header">
    <h1>水生生物パズル</h1>
</div>

<div id="game-container">
    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    <div id="overlay" style="display:none;">
        <h1>全クリア！おめでとうございます！</h1>
        <button onclick="location.reload()">もう一度遊ぶ</button>
    </div>
</div>

<div id="controls">
    左クリックでドラッグ：移動 / 右クリック：回転
</div>

<script>
// Base64 encoded assets (Injecting here)
const ASSETS_DATA = {}; // Will be filled by script or manually

class PuzzlePiece {
    constructor(name, dataUrl, targetX, targetY) {
        this.name = name;
        this.img = new Image();
        this.img.src = dataUrl;
        this.x = Math.random() < 0.5 ? Math.random() * 150 + 20 : Math.random() * 150 + 830;
        this.y = Math.random() * 500 + 50;
        this.targetX = targetX;
        this.targetY = targetY;
        this.rotation = [0, 90, 180, 270][Math.floor(Math.random() * 4)];
        this.targetRotation = 0;
        this.placed = false;
        this.dragging = false;
        this.width = 0;
        this.height = 0;
        this.offsetX = 0;
        this.offsetY = 0;

        this.img.onload = () => {
            const max = 120;
            let scale = 1;
            if (this.img.width > max || this.img.height > max) {
                scale = max / Math.max(this.img.width, this.img.height);
            }
            this.width = this.img.width * scale;
            this.height = this.img.height * scale;
        };
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate((this.rotation * Math.PI) / 180);
        
        // Shadow for wood feel
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 5;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;

        ctx.drawImage(this.img, -this.width / 2, -this.height / 2, this.width, this.height);
        
        if (this.placed) {
            ctx.strokeStyle = '#4caf50';
            ctx.lineWidth = 2;
            ctx.strokeRect(-this.width / 2, -this.height / 2, this.width, this.height);
        }
        ctx.restore();
    }

    isHit(mx, my) {
        if (this.placed) return false;
        // Simple circular hit test for simplicity in web version
        const dist = Math.sqrt((mx - this.x) ** 2 + (my - this.y) ** 2);
        return dist < Math.max(this.width, this.height) / 2;
    }

    checkSnap() {
        const d = Math.sqrt((this.x - this.targetX) ** 2 + (this.y - this.targetY) ** 2);
        if (d < 30 && this.rotation === this.targetRotation) {
            this.x = this.targetX;
            this.y = this.targetY;
            this.placed = true;
            return true;
        }
        return false;
    }
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const fieldRect = { x: 250, y: 50, width: 500, height: 500 };
let pieces = [];
let activePiece = null;

async function init() {
    // Load asset data from the JSON generated by Python
    const response = await fetch('assets_data.json');
    const assetMap = await response.json();
    
    const names = Object.keys(assetMap);
    const cols = 4;
    const rows = 3;
    const cellW = fieldRect.width / cols;
    const cellH = fieldRect.height / rows;

    names.forEach((name, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const tx = fieldRect.x + (col + 0.5) * cellW;
        const ty = fieldRect.y + (row + 0.5) * cellH;
        pieces.push(new PuzzlePiece(name, assetMap[name], tx, ty));
    });

    requestAnimationFrame(gameLoop);
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Field
    ctx.fillStyle = '#dcf0ff';
    ctx.fillRect(fieldRect.x, fieldRect.y, fieldRect.width, fieldRect.height);
    ctx.strokeStyle = '#96b4dc';
    ctx.lineWidth = 3;
    ctx.strokeRect(fieldRect.x, fieldRect.y, fieldRect.width, fieldRect.height);

    // Grid lines
    ctx.strokeStyle = '#c8dcf0';
    ctx.lineWidth = 1;
    for(let i=1; i<4; i++) {
        ctx.beginPath();
        ctx.moveTo(fieldRect.x + i * fieldRect.width/4, fieldRect.y);
        ctx.lineTo(fieldRect.x + i * fieldRect.width/4, fieldRect.y + fieldRect.height);
        ctx.stroke();
    }
    for(let i=1; i<3; i++) {
        ctx.beginPath();
        ctx.moveTo(fieldRect.x, fieldRect.y + i * fieldRect.height/3);
        ctx.lineTo(fieldRect.x + fieldRect.width, fieldRect.y + i * fieldRect.height/3);
        ctx.stroke();
    }

    pieces.forEach(p => p.draw(ctx));

    if (pieces.length > 0 && pieces.every(p => p.placed)) {
        document.getElementById('overlay').style.display = 'flex';
    }

    requestAnimationFrame(gameLoop);
}

canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (e.button === 0) { // Left
        for (let i = pieces.length - 1; i >= 0; i--) {
            if (pieces[i].isHit(mx, my)) {
                activePiece = pieces[i];
                activePiece.dragging = true;
                activePiece.offsetX = activePiece.x - mx;
                activePiece.offsetY = activePiece.y - my;
                // Move to top
                pieces.push(pieces.splice(i, 1)[0]);
                break;
            }
        }
    } else if (e.button === 2) { // Right
        for (let i = pieces.length - 1; i >= 0; i--) {
            if (pieces[i].isHit(mx, my)) {
                pieces[i].rotation = (pieces[i].rotation + 90) % 360;
                pieces[i].checkSnap();
                break;
            }
        }
    }
});

window.addEventListener('mousemove', e => {
    if (activePiece && activePiece.dragging) {
        const rect = canvas.getBoundingClientRect();
        activePiece.x = e.clientX - rect.left + activePiece.offsetX;
        activePiece.y = e.clientY - rect.top + activePiece.offsetY;
    }
});

window.addEventListener('mouseup', () => {
    if (activePiece) {
        activePiece.dragging = false;
        activePiece.checkSnap();
        activePiece = null;
    }
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

init();
</script>
</body>
</html>
